<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payslip Generator</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<div class="main-container" id="payslip">

    <!-- ================= HEADER ================= -->

    <div class="header-section">

        <img src="Logo.png" class="logo">

        <div>

            <h1 class="company-title">
                NR Softech (I) Pvt. Ltd.
            </h1>

            <h2 class="sub-title">
                Payslip Generator
            </h2>

        </div>

    </div>



    <!-- ================= EMPLOYEE DETAILS ================= -->

   <!-- ================= EMPLOYEE DETAILS ================= -->

<div class="section-box">

    <div class="employee-grid">

        <!-- LEFT -->

        <div>

            <div class="detail-row-inline">

                <label>Name</label>

                <input
                type="text"
                id="name"
                class="form-control required-field"
                placeholder="Enter Name"
                oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">

            </div>



            <div class="detail-row-inline">

                <label>Designation</label>

                <input
                type="text"
                id="designation"
                class="form-control required-field"
                placeholder="Enter Designation"
                oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">

            </div>



            <div class="detail-row-inline">

                <label>Department</label>

                <input
                type="text"
                id="department"
                class="form-control required-field"
                placeholder="Enter Department"
                oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">

            </div>



            <div class="detail-row-inline">

                <label>Pay Period</label>

                <div class="pay-period">

    <input
type="date"
id="payPeriod"
class="form-control required-field"
max="2099-12-31"
min="2000-01-01"
onkeydown="return false"
onchange="setLastDate()">

    <span>to</span>

    <input
    type="text"
    id="payDate"
    class="form-control readonly-field"
    readonly>

                </div>

            </div>



            <div class="detail-row-inline">

                <label>PF No.</label>
<input
type="text"
id="pfNumber"
class="form-control required-field"
placeholder="Enter PF No"


oninput="

this.value=this.value
.toUpperCase()
.replace(/[^A-Z0-9/]/g,'');

this.style.border='1px solid #ccc';

document.getElementById('pfError').innerHTML='';

"

onblur="

if(this.value.trim()===''){

this.style.border='2px solid red';

document.getElementById('pfError').innerHTML=
'PF Number is required';

}

"

onfocus="

this.style.border='1px solid #ccc';

document.getElementById('pfError').innerHTML='';

"
>

<small id="pfError" class="error-text"></small>


            </div>

        </div>



        <!-- RIGHT -->

        <div>

            <div class="detail-row-inline">

                <label>Pers. No.</label>
<input
type="text"
id="persNo"
class="form-control required-field"
placeholder="Enter Pers No"


oninput="

this.value=this.value
.toUpperCase()
.replace(/[^A-Z0-9]/g,'');

this.style.border='1px solid #ccc';

document.getElementById('persError').innerHTML='';

"

onblur="

if(this.value.trim()===''){

this.style.border='2px solid red';

document.getElementById('persError').innerHTML=
'Pers No is required';

}

"

onfocus="

this.style.border='1px solid #ccc';

document.getElementById('persError').innerHTML='';

"
>

<small id="persError" class="error-text"></small>
            </div>



            <div class="detail-row-inline">

                <label>PAN</label>

             
<input
type="text"
id="pan"
class="form-control required-field"
maxlength="10"
placeholder="Enter PAN"

oninput="
this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')
"

onblur="

let panPattern = /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/;
if(this.value!='' && !panPattern.test(this.value)){

this.style.border='2px solid red';

document.getElementById('panError').innerHTML=
'Enter Valid PAN Format (ABCDE1234F)';

}

else{

this.style.border='1px solid #ccc';

document.getElementById('panError').innerHTML='';

}
">

<small id="panError" class="error-text"></small>

            </div>



            <div class="detail-row-inline">

                <label>DOJ</label>

                <input
type="date"
id="doj"
class="form-control required-field"
max="2099-12-31"
min="2000-01-01"
onkeydown="return false">

            </div>
 



            <div class="detail-row-inline">

                <label>Paid Days</label>

            <input
type="text"
id="paidDays"
class="form-control readonly-field"
value="0.00"
readonly>

            </div>



            <div class="detail-row-inline">

                <label>UAN</label>

<input
type="text"
id="uan"
class="form-control required-field"
placeholder="Enter UAN"


oninput="

this.value=this.value
.toUpperCase()
.replace(/[^A-Z0-9]/g,'');

this.style.border='1px solid #ccc';

document.getElementById('uanError').innerHTML='';

"

onblur="

if(this.value.trim()===''){

this.style.border='2px solid red';

document.getElementById('uanError').innerHTML=
'UAN is required';

}

"

onfocus="

this.style.border='1px solid #ccc';

document.getElementById('uanError').innerHTML='';

"
>

<small id="uanError" class="error-text"></small>
            </div>

        </div>

    </div>

</div>



    <!-- ================= EARNINGS ================= -->

    <div class="section-box">

       <div class="amount-header">

    <div></div>

    <div class="text-center">

        <h5>Current Period</h5>

        <h6>Amount</h6>

    </div>

    <div class="text-center">

        <h5>Year to Date</h5>

        <h6>Amount</h6>

    </div>

</div>

        </div>

        <h3 class="section-title">
            EARNINGS
        </h3>

        <!-- BASIC -->

       <div class="salary-row">

    <label>Basic Pay</label>

  <input
type="number"
id="basicPay"
class="form-control required-field"
placeholder="Enter Monthly Basic Pay"
oninput="calculatePayslip()"
>

    <input
    type="text"
    id="basicPayYear"
    class="form-control readonly-field"
    value="0.00"
    readonly>

</div>



        <!-- HRA -->

        <div class="salary-row">

    <label>H.R.A.</label>

    <input
    type="text"
    id="hra"
    class="form-control readonly-field"
    value="0.00"
    readonly>

    <input
    type="text"
    id="hraYear"
    class="form-control readonly-field"
    value="0.00"
    readonly>

</div>



        <!-- TRANSPORT -->
<div class="salary-row">

    <label>Transport Allowance</label>
<input
type="number"
id="transport"
class="form-control required-field"
oninput="calculatePayslip()">

    <input
    type="text"
    id="transportYear"
    class="form-control readonly-field"
    value="0.00"
    readonly>

</div>



        <!-- MEAL -->

        <div class="salary-row">

    <label>Meal Coupon</label>

   <input
type="number"
id="meal"
class="form-control required-field"
oninput="calculatePayslip()">

    <input
    type="text"
    id="mealYear"
    class="form-control readonly-field"
    value="0.00"
    readonly>

</div>



        <!-- TOTAL EARNINGS -->

      <div class="salary-row total-row">

    <label>Total Earnings</label>

    <!-- CURRENT PERIOD -->

    <input
    type="text"
    id="totalEarnings"
    class="form-control readonly-field"
    readonly>

    <!-- YEAR TO DATE -->

    <input
    type="text"
    id="totalEarningsYear"
    class="form-control readonly-field"
    readonly>

</div>



    <!-- ================= TAXES ================= -->

    <!-- ================= TAXES ================= -->

<div class="section-box">

    <h3 class="section-title">
        TAXES
    </h3>



    <!-- Income Tax -->
<div class="salary-row">

    <label>Income Tax</label>

    <input
    type="text"
    id="incomeTax"
    class="form-control readonly-field"
    readonly>

    <input
    type="text"
    id="incomeTaxYear"
    class="form-control readonly-field"
    readonly>

</div>



    <!-- Total Tax -->
<div class="salary-row total-row">

    <label>Total Tax</label>

    <input
    type="text"
    id="totalTax"
    class="form-control readonly-field"
    readonly>

    <input
    type="text"
    id="totalTaxYear"
    class="form-control readonly-field"
    readonly>

</div>
<!-- ================= DEDUCTIONS ================= -->

<div class="section-box">

    <h3 class="section-title">
        DEDUCTIONS
    </h3>



    <!-- PF -->

    <div class="salary-row">

        <label>Ee PF contribution</label>

        <input
        type="text"
        id="pfContribution"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="pfYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>



    <!-- Professional Tax -->

    <div class="salary-row">

        <label>Prof Tax - Full period</label>

        <input
type="number"
id="professionalTax"
class="form-control required-field"
oninput="calculatePayslip()">

        <input
        type="text"
        id="professionalTaxYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>



    <!-- Insurance -->

    <div class="salary-row">

        <label>Med. Insurance - Sr. Citizen</label>

        <input
type="number"
id="insurance"
class="form-control required-field"
oninput="calculatePayslip()">

        <input
        type="text"
        id="insuranceYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>



    <!-- Sodexo -->

    <div class="salary-row">

        <label>Sodexo Deduction</label>

        <input
type="number"
id="sodexo"
class="form-control required-field"
oninput="calculatePayslip()">

        <input
        type="text"
        id="sodexoYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>



    <!-- Total Deductions -->

    <div class="salary-row total-row">

        <label>Total Deductions</label>

        <input
        type="text"
        id="totalDeductions"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="totalDeductionsYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>

</div>



    <!-- ================= BANK ================= -->

   <!-- ================= DIRECT DEPOSIT ================= -->

<div class="section-box">

    <h2 class="section-title">
        DIRECT DEPOSIT INFORMATION
    </h2>

    <div class="bank-grid">

        <!-- BANK NAME -->

        <div>

            <label>Bank Name</label>

            <select
                id="bankName"
                class="form-control required-field">
                 <option value="" selected disabled>Select Bank Name</option>

                <option value="SBI">SBI</option>

                <option value="HDFC">HDFC</option>

                <option value="ICICI">ICICI</option>

                <option value="AXIS">AXIS</option>

                <option value="KOTAK">KOTAK</option>

            </select>

        </div>



        <!-- BANK ACCOUNT -->

        <div>

            <label>Bank Account</label>

          <input
type="text"
id="bankAccount"
class="form-control required-field"
placeholder="Enter Bank Account Number"


oninput="

this.value=this.value.replace(/[^0-9]/g,'');

if(this.value.trim()===''){

this.style.border='1px solid #ccc';

document.getElementById('bankError').innerHTML='';

}

else{

this.style.border='1px solid #ccc';

document.getElementById('bankError').innerHTML='';

}

"

onblur="

if(this.value.trim()===''){

this.style.border='2px solid red';

document.getElementById('bankError').innerHTML=
'Bank Account Number is required';

}

else if(this.value.length < 9){

this.style.border='2px solid red';

document.getElementById('bankError').innerHTML=
'Enter Valid Bank Account Number';

}

else{

this.style.border='1px solid #ccc';

document.getElementById('bankError').innerHTML='';

}

"

onfocus="

this.style.border='1px solid #ccc';

document.getElementById('bankError').innerHTML='';

"
>

<small id="bankError" class="error-text"></small>

        </div>

    </div>

</div>



    <!-- ================= FORMULA ================= -->

    <!-- ================= FORMULA ================= -->

<!-- ================= FORMULA ================= -->

<div class="section-box">

    <h3 class="section-title">
        FORMULA
    </h3>



    <!-- FORMULA TEXT -->

    <div class="formula-text">

        NET PAY &nbsp; = &nbsp;

        TOTAL EARNINGS

        &nbsp; - &nbsp;

        TOTAL TAXES

        &nbsp; - &nbsp;

        TOTAL DEDUCTIONS

    </div>



    <!-- LABELS -->

    <div class="formula-labels">

        <div>NET PAY</div>

        <div>TOTAL EARNINGS</div>

        <div>TOTAL TAXES</div>

        <div>TOTAL DEDUCTIONS</div>

    </div>



    <!-- BOXES -->

    <div class="formula-grid">

        <input
type="text"
id="netPay"
class="form-control readonly-field"
readonly>


        <input
        type="text"
        id="formulaEarnings"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="formulaTaxes"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="formulaDeductions"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>

</div>



    <!-- ================= BUTTONS ================= -->

    <div class="button-section">

       
       <button
type="button"
class="btn btn-success"
onclick="savePayslip()">

Save Payslip

</button>
<button
type="button"
class="btn btn-danger"
onclick="downloadPayslip()">

Download Payslip

</button>

</button>

    </div>

</div>



<script src="script.js"></script>
</body>
</html>
