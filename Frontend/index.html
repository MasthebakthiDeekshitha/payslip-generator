<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payslip Generator</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="main-container">

    <!-- ================= HEADER ================= -->

    <div class="header-section">

        <img src="Logo.png" class="logo">

        <div>

            <h1 class="company-title">
                NR Softech (I) Pvt. Ltd.
            </h1>

            <h2 class="sub-title">
                Payslip Generator
            </h2>

        </div>

    </div>



    <!-- ================= EMPLOYEE DETAILS ================= -->

   <!-- ================= EMPLOYEE DETAILS ================= -->

<div class="section-box">

    <div class="employee-grid">

        <!-- LEFT -->

        <div>

            <div class="detail-row-inline">

                <label>Name</label>

                <input
                type="text"
                id="name"
                class="form-control"
                placeholder="Enter Name"
                oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">

            </div>



            <div class="detail-row-inline">

                <label>Designation</label>

                <input
                type="text"
                id="designation"
                class="form-control"
                placeholder="Enter Designation"
                oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">

            </div>



            <div class="detail-row-inline">

                <label>Department</label>

                <input
                type="text"
                id="department"
                class="form-control"
                placeholder="Enter Department"
                oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">

            </div>



            <div class="detail-row-inline">

                <label>Pay Period</label>

                <div class="pay-period">

                     <input
    type="month"
    id="payPeriod"
    class="form-control"
    onchange="setLastDate()">

    <span>to</span>

    <input
    type="text"
    id="payDate"
    class="form-control readonly-field"
    readonly>

                </div>

            </div>



            <div class="detail-row-inline">

                <label>PF No.</label>
<input
type="text"
id="pfNo"
class="form-control"
maxlength="10"
placeholder="Enter PF.No"

oninput="
this.value=this.value.toUpperCase();

if(this.value.length<=2){

this.value=this.value.replace(/[^A-Z]/g,'');

}

else{

let first=this.value.substring(0,2).replace(/[^A-Z]/g,'');

let second=this.value.substring(2).replace(/[^0-9]/g,'');

this.value=first+second;

}
">

            </div>

        </div>



        <!-- RIGHT -->

        <div>

            <div class="detail-row-inline">

                <label>Pers. No.</label>

                <input
type="text"
id="persNo"
class="form-control"
maxlength="7"
placeholder="Enter Pers. No"

oninput="
this.value=this.value.toUpperCase();

if(this.value.length<=3){

this.value=this.value.replace(/[^A-Z]/g,'');

}

else{

let first=this.value.substring(0,3).replace(/[^A-Z]/g,'');

let second=this.value.substring(3).replace(/[^0-9]/g,'');

this.value=first+second;

}
">
            </div>



            <div class="detail-row-inline">

                <label>PAN</label>

             
<input
type="text"
id="pan"
class="form-control"
maxlength="10"
placeholder="Enter PAN"



pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"

oninput="
this.value=this.value.toUpperCase();

if(this.value.length<=5){
this.value=this.value.replace(/[^A-Z]/g,'');
}

else if(this.value.length<=9){

let first=this.value.substring(0,5).replace(/[^A-Z]/g,'');

let second=this.value.substring(5).replace(/[^0-9]/g,'');

this.value=first+second;
}

else{

let first=this.value.substring(0,5).replace(/[^A-Z]/g,'');

let second=this.value.substring(5,9).replace(/[^0-9]/g,'');

let third=this.value.substring(9,10).replace(/[^A-Z]/g,'');

this.value=first+second+third;
}
">
            </div>



            <div class="detail-row-inline">

                <label>DOJ</label>

                <input
                type="date"
                id="doj"
                class="form-control">

            </div>



            <div class="detail-row-inline">

                <label>Paid Days</label>

               <input type="number"
                      id="paidDays"
                      class="form-control"
                      step="0.01"
                      placeholder="0.00">

            </div>



            <div class="detail-row-inline">

                <label>UAN</label>

               <input
type="text"
id="uan"
class="form-control"
maxlength="12"
placeholder="Enter UAN"

oninput="
this.value=this.value.replace(/[^0-9]/g,'');
">

            </div>

        </div>

    </div>

</div>



    <!-- ================= EARNINGS ================= -->

    <div class="section-box">

       <div class="amount-header">

    <div></div>

    <div class="text-center">

        <h5>Current Period</h5>

        <h6>Amount</h6>

    </div>

    <div class="text-center">

        <h5>Year to Date</h5>

        <h6>Amount</h6>

    </div>

</div>

        </div>

        <h3 class="section-title">
            EARNINGS
        </h3>

        <!-- BASIC -->

       <div class="salary-row">

    <label>Basic Pay</label>

    <input
    type="number"
    id="basicPay"
    class="form-control"
    step="0.01"
    placeholder="0.00">

    <input
    type="text"
    id="basicPayYear"
    class="form-control readonly-field"
    value="0.00"
    readonly>

</div>



        <!-- HRA -->

        <div class="salary-row">

    <label>H.R.A.</label>

    <input
    type="text"
    id="hra"
    class="form-control readonly-field"
    value="0.00"
    readonly>

    <input
    type="text"
    id="hraYear"
    class="form-control readonly-field"
    value="0.00"
    readonly>

</div>



        <!-- TRANSPORT -->
<div class="salary-row">

    <label>Transport Allowance</label>

    <input
    type="number"
    id="transport"
    class="form-control"
    step="0.01"
    placeholder="0.00">

    <input
    type="text"
    id="transportYear"
    class="form-control readonly-field"
    value="0.00"
    readonly>

</div>



        <!-- MEAL -->

        <div class="salary-row">

    <label>Meal Coupon</label>

    <input
    type="number"
    id="meal"
    class="form-control"
    step="0.01"
    placeholder="0.00">

    <input
    type="text"
    id="mealYear"
    class="form-control readonly-field"
    value="0.00"
    readonly>

</div>



        <!-- TOTAL EARNINGS -->

       <div class="salary-row total-row">

    <label>Total Earnings</label>

    <input
    type="text"
    id="totalEarnings"
    class="form-control readonly-field"
    value="0.00"
    readonly>

    <input
    type="text"
    id="totalEarningsYear"
    class="form-control readonly-field"
    value="0.00"
    readonly>

</div>



    <!-- ================= TAXES ================= -->

    <!-- ================= TAXES ================= -->

<div class="section-box">

    <h3 class="section-title">
        TAXES
    </h3>



    <!-- Income Tax -->

    <div class="salary-row">

        <label>Income Tax</label>

        <input
        type="text"
        id="incomeTax"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="incomeTaxYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>



    <!-- Total Tax -->

    <div class="salary-row total-row">

        <label>Total Tax</label>

        <input
        type="text"
        id="totalTax"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="totalTaxYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>

</div><!-- ================= DEDUCTIONS ================= -->

<div class="section-box">

    <h3 class="section-title">
        DEDUCTIONS
    </h3>



    <!-- PF -->

    <div class="salary-row">

        <label>Ee PF contribution</label>

        <input
        type="text"
        id="pfContribution"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="pfYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>



    <!-- Professional Tax -->

    <div class="salary-row">

        <label>Prof Tax - Full period</label>

        <input
        type="number"
        id="professionalTax"
        class="form-control"
        step="0.01"
        placeholder="0.00">

        <input
        type="text"
        id="professionalTaxYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>



    <!-- Insurance -->

    <div class="salary-row">

        <label>Med. Insurance - Sr. Citizen</label>

        <input
        type="number"
        id="insurance"
        class="form-control"
        step="0.01"
        placeholder="0.00">

        <input
        type="text"
        id="insuranceYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>



    <!-- Sodexo -->

    <div class="salary-row">

        <label>Sodexo Deduction</label>

        <input
        type="number"
        id="sodexo"
        class="form-control"
        step="0.01"
        placeholder="0.00">

        <input
        type="text"
        id="sodexoYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>



    <!-- Total Deductions -->

    <div class="salary-row total-row">

        <label>Total Deductions</label>

        <input
        type="text"
        id="totalDeductions"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="totalDeductionsYear"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>

</div>



    <!-- ================= BANK ================= -->

   <!-- ================= DIRECT DEPOSIT ================= -->

<div class="section-box">

    <h2 class="section-title">
        DIRECT DEPOSIT INFORMATION
    </h2>

    <div class="bank-grid">

        <!-- BANK NAME -->

        <div>

            <label>Bank Name</label>

            <select
                id="bankName"
                class="form-control">

                <option value="SBI" selected>SBI</option>

                <option value="HDFC">HDFC</option>

                <option value="ICICI">ICICI</option>

                <option value="AXIS">AXIS</option>

                <option value="KOTAK">KOTAK</option>

            </select>

        </div>



        <!-- BANK ACCOUNT -->

        <div>

            <label>Bank Account</label>

            <input
                type="text"
                id="bankAccount"
                class="form-control"
                placeholder="Enter Bank Account">

        </div>

    </div>

</div>



    <!-- ================= FORMULA ================= -->

    <!-- ================= FORMULA ================= -->

<!-- ================= FORMULA ================= -->

<div class="section-box">

    <h3 class="section-title">
        FORMULA
    </h3>



    <!-- FORMULA TEXT -->

    <div class="formula-text">

        NET PAY &nbsp; = &nbsp;

        TOTAL EARNINGS

        &nbsp; - &nbsp;

        TOTAL TAXES

        &nbsp; - &nbsp;

        TOTAL DEDUCTIONS

    </div>



    <!-- LABELS -->

    <div class="formula-labels">

        <div>NET PAY</div>

        <div>TOTAL EARNINGS</div>

        <div>TOTAL TAXES</div>

        <div>TOTAL DEDUCTIONS</div>

    </div>



    <!-- BOXES -->

    <div class="formula-grid">

        <input
        type="text"
        id="netPay"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="formulaEarnings"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="formulaTaxes"
        class="form-control readonly-field"
        value="0.00"
        readonly>

        <input
        type="text"
        id="formulaDeductions"
        class="form-control readonly-field"
        value="0.00"
        readonly>

    </div>

</div>



    <!-- ================= BUTTONS ================= -->

    <div class="button-section">

        <button
        type="button"
        class="btn btn-primary btn-lg"
        onclick="calculatePayslip()">

            Calculate

        </button>

        <button
        type="button"
        class="btn btn-success btn-lg"
        onclick="savePayslip()">

            Save Payslip

        </button>

    </div>

</div>



<script src="script.js"></script>

</body>
</html>
